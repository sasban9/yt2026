<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Three Phases — 1 · 10 · 100 Crore</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#080608;font-family:'DM Mono',monospace;-webkit-font-smoothing:antialiased}

:root{
  --gold:#d4a030;--gold2:#f0c060;--gold3:rgba(212,160,48,0.15);
  --amber:#c47820;--amber2:rgba(196,120,32,0.12);
  --cyan:#3dd4e0;--cyan2:rgba(61,212,224,0.12);
  --green:#38c870;--green2:rgba(56,200,112,0.1);
  --bg:#080608;--bg2:#0e0b0e;--bg3:#14101a;
  --text:#f0ead8;--muted:rgba(240,234,216,0.4);--dim:rgba(240,234,216,0.15);
}

/* ────────── STAGE ────────── */
.stage{
  width:100vw;height:100vh;position:relative;overflow:hidden;
  background:radial-gradient(ellipse 120% 80% at 50% 110%,#1a0e08,#080608 70%);
}

/* grain */
.stage::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
  opacity:.5;mix-blend-mode:overlay;
}

/* ────────── SLIDE ELEMENT BASE ────────── */
.el{
  position:absolute;will-change:transform,opacity;
  transition-timing-function:cubic-bezier(0.4,0,0.2,1);
}
.el.stay{transition:none}

/* ────────── BACKGROUNDS ────────── */
#bg-glow{
  inset:0;position:absolute;pointer-events:none;z-index:0;
  transition:background 1.2s ease;
}

/* ────────── PERSISTENT: TIMELINE ────────── */
#timeline{
  bottom:28px;left:5%;width:90%;height:3px;z-index:50;
}
.tl-track{width:100%;height:3px;background:rgba(255,255,255,0.06);border-radius:2px;position:relative}
.tl-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));width:0;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 12px rgba(212,160,48,0.4)}
.tl-dot{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%);border:2px solid}
.tl-dots-row{position:absolute;top:50%;left:0;width:100%;height:0;display:flex;justify-content:space-between;align-items:center}
.tl-label{position:absolute;bottom:-22px;font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;transform:translateX(-50%)}
#slide-ctr{position:absolute;right:0;bottom:-20px;font-size:11px;color:var(--dim);letter-spacing:1px}

/* ────────── PERSISTENT: PHASE BAR ────────── */
#phase-bar{
  top:28px;left:50%;transform:translateX(-50%);
  display:flex;gap:32px;z-index:50;align-items:center;
}
.ph-chip{
  font-size:12px;letter-spacing:3px;text-transform:uppercase;
  color:var(--dim);transition:color .5s,opacity .5s;opacity:0.4;
  display:flex;align-items:center;gap:8px;
}
.ph-chip.active{opacity:1;}
.ph-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:background .5s;flex-shrink:0}
.ph-chip.p1.active{color:var(--gold)}.ph-chip.p1.active .dot{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.ph-chip.p2.active{color:var(--cyan)}.ph-chip.p2.active .dot{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.ph-chip.p3.active{color:var(--green)}.ph-chip.p3.active .dot{background:var(--green);box-shadow:0 0 8px var(--green)}

/* ────────── NAV ZONES ────────── */
.nav-zone{position:fixed;top:0;bottom:0;width:18%;z-index:200;cursor:pointer;opacity:0}
#nz-prev{left:0}
#nz-next{right:0}
.nav-hint{
  position:fixed;top:50%;transform:translateY(-50%);z-index:201;
  font-size:28px;color:rgba(255,255,255,0.12);pointer-events:none;
  transition:opacity .3s;opacity:0;
}
.nav-hint.left{left:16px}
.nav-hint.right{right:16px}

/* ────────── BIG NUMBER ────────── */
.big-num{
  font-family:'Bebas Neue',sans-serif;
  letter-spacing:-1px;line-height:0.92;
}
.serif-display{
  font-family:'Cormorant Garamond',serif;
  font-weight:300;line-height:1.05;
}

/* ────────── COIN ────────── */
.coin{
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  position:absolute;font-family:'Bebas Neue',sans-serif;
  border:2px solid;flex-shrink:0;
  box-shadow:inset 0 0 20px rgba(0,0,0,0.4),0 0 0 1px rgba(255,255,255,0.04);
}

/* ────────── BAR CHART ────────── */
.bar-group{position:absolute;display:flex;align-items:flex-end;gap:6px}
.bar{border-radius:3px 3px 0 0;transform-origin:bottom;transform:scaleY(0);transition:transform 0.8s cubic-bezier(0.34,1.4,0.64,1)}
.bar.grow{transform:scaleY(1)}

/* ────────── PILE ────────── */
.pile{position:absolute;display:flex;flex-direction:column;align-items:center;gap:8px}
.pile-bar{border-radius:6px 6px 0 0;transform-origin:bottom;transform:scaleY(0);transition:transform 1s cubic-bezier(0.34,1.3,0.64,1)}
.pile-bar.grow{transform:scaleY(1)}
.pile-label{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:6px}
.pile-amount{font-family:'Bebas Neue',sans-serif;font-size:28px;margin-top:2px}

/* ────────── SPLIT VISUAL ────────── */
.split-vis{position:absolute;overflow:hidden;border-radius:4px}
.split-half{position:absolute;top:0;bottom:0;transition:width 1s cubic-bezier(0.4,0,0.2,1)}

/* ────────── RING ────────── */
.ring{
  border-radius:50%;position:absolute;
  border:2px solid;
  transform-origin:center;
}

/* ────────── FLOW ARROW ────────── */
.flow-arrow{
  position:absolute;
  font-family:'Bebas Neue',sans-serif;font-size:36px;
  color:var(--dim);
  opacity:0;
  transition:opacity .6s;
}
.flow-arrow.show{opacity:1}

/* ────────── FLOATING WORDS ────────── */
.float-word{
  position:absolute;
  font-size:12px;letter-spacing:3px;text-transform:uppercase;
  color:var(--muted);opacity:0;
  animation:none;
  transition:opacity .5s;
}
.float-word.show{opacity:1}

/* ────────── KEYFRAMES ────────── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-40px)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
@keyframes zoomIn{from{opacity:0;transform:scale(0.7)}to{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.7;transform:scale(0.97)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0}to{opacity:1}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(212,160,48,0.3)}50%{box-shadow:0 0 40px rgba(212,160,48,0.6)}}
@keyframes waveIn{from{opacity:0;clip-path:inset(0 100% 0 0)}to{opacity:1;clip-path:inset(0 0% 0 0)}}
@keyframes particleFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}

.anim-fadeIn{animation:fadeIn .6s forwards}
.anim-slideUp{animation:slideUp .7s cubic-bezier(0.34,1.2,0.64,1) forwards}
.anim-slideDown{animation:slideDown .5s ease forwards}
.anim-slideLeft{animation:slideLeft .7s cubic-bezier(0.34,1.2,0.64,1) forwards}
.anim-slideRight{animation:slideRight .7s cubic-bezier(0.34,1.2,0.64,1) forwards}
.anim-zoomIn{animation:zoomIn .6s cubic-bezier(0.34,1.4,0.64,1) forwards}
.anim-pulse{animation:pulse 2s ease infinite}
.anim-glow{animation:glow 2s ease infinite}
.anim-floatUp{animation:floatUp 3s ease-in-out infinite}
.anim-waveIn{animation:waveIn .8s cubic-bezier(0.4,0,0.2,1) forwards}

.delay-1{animation-delay:.1s}
.delay-2{animation-delay:.2s}
.delay-3{animation-delay:.35s}
.delay-4{animation-delay:.5s}
.delay-5{animation-delay:.65s}
.delay-6{animation-delay:.8s}
.delay-7{animation-delay:1s}
.delay-8{animation-delay:1.2s}
</style>
</head>
<body>
<div class="stage" id="stage">

  <!-- PERSISTENT GLOW -->
  <div class="el stay" id="bg-glow"></div>

  <!-- PERSISTENT PHASE BAR -->
  <div class="el stay" id="phase-bar">
    <div class="ph-chip p1" id="chip1"><div class="dot"></div>Phase 1</div>
    <div style="width:20px;height:1px;background:var(--dim)"></div>
    <div class="ph-chip p2" id="chip2"><div class="dot"></div>Phase 2</div>
    <div style="width:20px;height:1px;background:var(--dim)"></div>
    <div class="ph-chip p3" id="chip3"><div class="dot"></div>Phase 3</div>
  </div>

  <!-- PERSISTENT TIMELINE -->
  <div class="el stay" id="timeline">
    <div class="tl-track">
      <div class="tl-fill" id="tl-fill"></div>
      <div class="tl-dots-row" id="tl-dots-row"></div>
    </div>
    <span id="slide-ctr">1 / 24</span>
  </div>

  <!-- SLIDE LAYER (dynamically populated) -->
  <div id="slide-layer" style="position:absolute;inset:0;z-index:10"></div>

  <!-- NAV ZONES -->
  <div class="nav-zone" id="nz-prev"></div>
  <div class="nav-zone" id="nz-next"></div>
  <div class="nav-hint left" id="hint-l">‹</div>
  <div class="nav-hint right" id="hint-r">›</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const $ = id => document.getElementById(id);
const lerp = (a,b,t) => a+(b-a)*t;
const W = () => window.innerWidth;
const H = () => window.innerHeight;
const cx = () => W()/2;
const cy = () => H()/2;

const COL = {
  gold:'#d4a030', gold2:'#f0c060', goldD:'rgba(212,160,48,0.15)',
  amber:'#c47820',
  cyan:'#3dd4e0', cyanD:'rgba(61,212,224,0.12)',
  green:'#38c870', greenD:'rgba(56,200,112,0.1)',
  text:'#f0ead8', muted:'rgba(240,234,216,0.42)', dim:'rgba(240,234,216,0.16)',
};

function el(tag='div', attrs={}, styles={}, html=''){
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v]) => e.setAttribute(k,v));
  Object.assign(e.style, styles);
  if(html) e.innerHTML = html;
  return e;
}

// ═══════════════════════════════════════════════════════════
// SLIDE DEFINITIONS
// ═══════════════════════════════════════════════════════════
// Each slide: { id, phase (0-3), bgColor, build(layer) }
// build() adds elements to the layer div

const SLIDES = [];

function def(phase, bgHex, buildFn){
  SLIDES.push({ phase, bg: bgHex, build: buildFn });
}

// ── HELPER BUILDERS ──
function addText(layer, text, x, y, size, color, font='Bebas Neue', weight=400, animClass='anim-fadeIn', delay=0, extra={}){
  const d = el('div',{},{
    position:'absolute',
    left: typeof x === 'string' ? x : x+'px',
    top:  typeof y === 'string' ? y : y+'px',
    fontSize: size+'px',
    color,
    fontFamily: font === 'serif' ? "'Cormorant Garamond',serif" : font === 'mono' ? "'DM Mono',monospace" : "'Bebas Neue',sans-serif",
    fontWeight: weight,
    lineHeight:'1',
    letterSpacing: font==='Bebas Neue'?'-1px':'',
    opacity:'0',
    transform: animClass.includes('Up') ? 'translateY(40px)' : animClass.includes('Left') ? 'translateX(60px)' : animClass.includes('Zoom') ? 'scale(0.7)' : 'none',
    ...extra
  });
  d.textContent = text;
  d.className = animClass + (delay > 0 ? ' delay-'+delay : '');
  d.style.animationFillMode = 'forwards';
  layer.appendChild(d);
  return d;
}

function addCoin(layer, x, y, size, color, text, animClass='anim-zoomIn', delay=0){
  const d = el('div',{},{
    position:'absolute',
    left:(typeof x==='string'?x:x+'px'),
    top:(typeof y==='string'?y:y+'px'),
    width:size+'px',height:size+'px',
    borderRadius:'50%',
    display:'flex',alignItems:'center',justifyContent:'center',
    background:`radial-gradient(circle at 35% 35%, ${color}33, ${color}08)`,
    border:`2px solid ${color}`,
    boxShadow:`0 0 ${size*0.3}px ${color}44, inset 0 0 ${size*0.2}px rgba(0,0,0,0.5)`,
    color,
    fontFamily:"'Bebas Neue',sans-serif",
    fontSize:Math.max(14,size*0.22)+'px',
    opacity:'0',
  });
  d.className = animClass + (delay>0?' delay-'+delay:'');
  d.style.animationFillMode='forwards';
  d.textContent = text;
  layer.appendChild(d);
  return d;
}

function addBar(layer, x, y, w, h, color, grow=true, delay=0){
  const wrap = el('div',{},{position:'absolute',left:x+'px',bottom:y+'px',width:w+'px',height:h+'px'});
  wrap.style.background = `linear-gradient(to top, ${color}bb, ${color}55)`;
  wrap.style.borderRadius = '4px 4px 0 0';
  wrap.style.transformOrigin = 'bottom';
  wrap.style.transform = 'scaleY(0)';
  wrap.style.transition = `transform 0.9s cubic-bezier(0.34,1.4,0.64,1) ${delay*0.12}s`;
  wrap.style.boxShadow = `0 0 20px ${color}33`;
  if(grow) setTimeout(()=>wrap.style.transform='scaleY(1)', 100);
  layer.appendChild(wrap);
  return wrap;
}

function addPile(layer, x, y, width, height, color, label, amount, delay=0){
  const wrap = el('div',{},{position:'absolute',left:x+'px',top:y+'px',width:width+'px',display:'flex',flexDirection:'column',alignItems:'center',gap:'6px'});
  const barWrap = el('div',{},{width:'100%',height:height+'px',background:'rgba(255,255,255,0.04)',borderRadius:'6px',overflow:'hidden',display:'flex',flexDirection:'column',justifyContent:'flex-end'});
  const bar = el('div',{},{width:'100%',background:`linear-gradient(to top, ${color}cc, ${color}44)`,borderRadius:'4px 4px 0 0',height:'100%',transformOrigin:'bottom',transform:'scaleY(0)',transition:`transform 1s cubic-bezier(0.34,1.3,0.64,1) ${delay*0.15}s`,boxShadow:`0 0 24px ${color}33`});
  barWrap.appendChild(bar);
  const lbl = el('div',{},{fontSize:'11px',color:'rgba(240,234,216,0.4)',letterSpacing:'2px',textTransform:'uppercase',marginTop:'6px',fontFamily:"'DM Mono',monospace"});
  lbl.textContent = label;
  const amt = el('div',{},{fontFamily:"'Bebas Neue',sans-serif",fontSize:'26px',color,marginTop:'2px'});
  amt.textContent = amount;
  wrap.appendChild(barWrap);
  wrap.appendChild(lbl);
  wrap.appendChild(amt);
  layer.appendChild(wrap);
  setTimeout(()=>bar.style.transform='scaleY(1)',150);
  return {wrap,bar};
}

function addSplit(layer, x, y, w, h, leftColor, rightColor, leftPct=50, delay=0){
  const wrap = el('div',{},{position:'absolute',left:x+'px',top:y+'px',width:w+'px',height:h+'px',borderRadius:'4px',overflow:'hidden',background:'rgba(255,255,255,0.04)'});
  const left = el('div',{},{position:'absolute',top:0,left:0,bottom:0,width:'0%',background:`linear-gradient(135deg, ${leftColor}cc, ${leftColor}44)`,transition:`width 1.2s cubic-bezier(0.4,0,0.2,1) ${delay*0.1}s`});
  const right = el('div',{},{position:'absolute',top:0,right:0,bottom:0,width:'0%',background:`linear-gradient(135deg, ${rightColor}cc, ${rightColor}44)`,transition:`width 1.2s cubic-bezier(0.4,0,0.2,1) ${(delay+2)*0.1}s`});
  const divider = el('div',{},{position:'absolute',top:0,bottom:0,left:`${leftPct}%`,width:'2px',background:'rgba(0,0,0,0.4)',transform:'scaleY(0)',transition:'transform .3s .8s'});
  wrap.appendChild(left);wrap.appendChild(right);wrap.appendChild(divider);
  layer.appendChild(wrap);
  setTimeout(()=>{
    left.style.width=leftPct+'%';
    right.style.width=(100-leftPct)+'%';
    divider.style.transform='scaleY(1)';
  },200);
  return {wrap,left,right};
}

function addRing(layer, x, y, size, color, delay=0){
  const d = el('div',{},{
    position:'absolute',
    left:(typeof x==='string'?x:(x-size/2))+'px',
    top:(typeof y==='string'?y:(y-size/2))+'px',
    width:size+'px',height:size+'px',
    borderRadius:'50%',
    border:`1px solid ${color}`,
    opacity:'0',
    animation:`fadeIn .6s ${delay}s forwards`,
    animationFillMode:'forwards',
    boxShadow:`0 0 ${size*0.15}px ${color}22`,
  });
  layer.appendChild(d);
  return d;
}

function addLabel(layer, text, x, y, color=COL.muted, size=11, delay=0){
  const d = el('div',{},{
    position:'absolute',
    left:typeof x==='string'?x:x+'px',
    top:typeof y==='string'?y:y+'px',
    fontSize:size+'px',
    color,
    fontFamily:"'DM Mono',monospace",
    letterSpacing:'2.5px',
    textTransform:'uppercase',
    opacity:'0',
    animation:`fadeIn .5s ${delay}s forwards`,
    animationFillMode:'forwards',
  });
  d.textContent = text;
  layer.appendChild(d);
  return d;
}

function addCounterNum(layer, final, x, y, size, color, prefix='', suffix='', delay=0){
  const d = el('div',{},{
    position:'absolute',
    left:typeof x==='string'?x:x+'px',
    top:typeof y==='string'?y:y+'px',
    fontSize:size+'px',
    color,
    fontFamily:"'Bebas Neue',sans-serif",
    letterSpacing:'-1px',
    lineHeight:'1',
  });
  d.textContent = prefix+'0'+suffix;
  layer.appendChild(d);
  setTimeout(()=>{
    let start = 0;
    const end = parseFloat(final);
    const dur = 1500;
    const t0 = performance.now();
    function tick(now){
      const p = Math.min((now-t0)/dur,1);
      const val = lerp(0,end,p < 0.5 ? 2*p*p : -1+(4-2*p)*p);
      d.textContent = prefix + (Number.isInteger(end) ? Math.round(val) : val.toFixed(1)) + suffix;
      if(p<1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }, delay*150);
  return d;
}

function addGlowCircle(layer, x, y, size, color){
  const d = el('div',{},{
    position:'absolute',
    left:typeof x==='string'?x:(x-size/2)+'px',
    top:typeof y==='string'?y:(y-size/2)+'px',
    width:size+'px',height:size+'px',
    borderRadius:'50%',
    background:`radial-gradient(circle, ${color}18 0%, transparent 70%)`,
    pointerEvents:'none',
  });
  layer.appendChild(d);
  return d;
}

function addLine(layer, x1, y1, x2, y2, color, delay=0){
  const angle = Math.atan2(y2-y1, x2-x1) * 180/Math.PI;
  const length = Math.sqrt((x2-x1)**2+(y2-y1)**2);
  const d = el('div',{},{
    position:'absolute',
    left:x1+'px',top:y1+'px',
    width:length+'px',height:'1px',
    background:color,
    transformOrigin:'0 50%',
    transform:`rotate(${angle}deg)`,
    opacity:'0',
    animation:`waveIn .6s ${delay}s forwards`,
    animationFillMode:'forwards',
  });
  layer.appendChild(d);
  return d;
}

// ═══════════════════════════════════════════════════════════
// THE 24 SLIDES
// ═══════════════════════════════════════════════════════════

// ─ SLIDE 1: TITLE ─
def(0, '#080608', (L) => {
  addGlowCircle(L,'calc(50% - 300px)','calc(50% - 200px)',600,COL.gold);
  addText(L,'YOUR CAREER','calc(50% - 260px)','calc(50% - 80px)',Math.min(W()*0.09,80),COL.muted,'Cormorant Garamond',300,'anim-fadeIn',0,{letterSpacing:'8px',whiteSpace:'nowrap'});
  addText(L,'IN THREE PHASES',  '5%','calc(50% - 20px)',Math.min(W()*0.12,110),COL.text,'Bebas Neue',400,'anim-slideRight',2,{letterSpacing:'-2px'});
  addRing(L,'calc(50% - 180px)','calc(50% - 200px)',360,COL.goldD+'66',0.3);
  addRing(L,'calc(50% - 240px)','calc(50% - 260px)',480,COL.goldD+'33',0.5);
  addText(L,'1 · 10 · 100  Crore','5%','calc(50% + 110px)',Math.min(W()*0.05,44),COL.gold,'Bebas Neue',400,'anim-slideUp',3,{letterSpacing:'4px'});
});

// ─ SLIDE 2: THREE PHASES PREVIEW ─
def(0, '#08060a', (L) => {
  const cxW = W()/2, cyH = H()/2;
  [COL.gold,COL.cyan,COL.green].forEach((c,i) => {
    addGlowCircle(L,cxW-240+i*240-80,cyH-80,160,c);

// ═══════════════════════════════════════════════════════════
// SLIDE ENGINE
// ═══════════════════════════════════════════════════════════
const N = SLIDES.length;
let cur = 0;
const layer = $('slide-layer');

// Build timeline dots
const dotRow = $('tl-dots-row');
for(let i=0;i<N;i++){
  const d=el('div',{},{
    width:'6px',height:'6px',borderRadius:'50%',background:'rgba(255,255,255,0.1)',
    cursor:'pointer',transition:'background .3s, transform .3s',flexShrink:'0',
  });
  d.addEventListener('click',()=>goTo(i));
  dotRow.appendChild(d);
}

const PHASE_COLORS=['rgba(0,0,0,0)',`radial-gradient(ellipse 100% 80% at 50% 110%, #180c00 0%, #08060a 60%)`,`radial-gradient(ellipse 100% 80% at 50% 110%, #001218 0%, #04080e 60%)`,`radial-gradient(ellipse 100% 80% at 50% 110%, #001808 0%, #040e06 60%)`];

function showSlide(n){
  const s=SLIDES[n];
  // clear
  while(layer.firstChild) layer.removeChild(layer.firstChild);
  // bg
  $('bg-glow').style.background = PHASE_COLORS[s.phase] || PHASE_COLORS[0];
  // phase chips
  ['chip1','chip2','chip3'].forEach((id,i)=>{
    const ch=$(id);
    ch.classList.toggle('active',i+1===s.phase||(s.phase===0&&n>=19));
    ch.classList.toggle('p1',i===0);
    ch.classList.toggle('p2',i===1);
    ch.classList.toggle('p3',i===2);
  });
  if(s.phase===0&&n<=1){
    $('chip1').classList.remove('active');$('chip2').classList.remove('active');$('chip3').classList.remove('active');
  }
  // timeline
  $('tl-fill').style.width = ((n/(N-1))*100)+'%';
  dotRow.querySelectorAll('div').forEach((d,i)=>{
    const phase=SLIDES[i].phase;
    const colors=[COL.gold,COL.cyan,COL.green];
    d.style.background = i<=n ? (phase>0?colors[phase-1]:'rgba(255,255,255,0.3)') : 'rgba(255,255,255,0.1)';
    d.style.transform = i===n ? 'scale(1.6)' : 'scale(1)';
    d.style.boxShadow = i===n && phase>0 ? `0 0 6px ${colors[phase-1]}` : 'none';
  });
  $('slide-ctr').textContent = `${n+1} / ${N}`;
  // build
  s.build(layer);
}

function goTo(n){
  if(n<0||n>=N) return;
  cur=n;
  showSlide(cur);
  $('nz-prev').style.pointerEvents=cur>0?'auto':'none';
  $('nz-next').style.pointerEvents=cur<N-1?'auto':'none';
}

// NAV
$('nz-prev').addEventListener('click',()=>goTo(cur-1));
$('nz-next').addEventListener('click',()=>goTo(cur+1));
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' ') goTo(cur+1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') goTo(cur-1);
});
let touchX=0;
document.addEventListener('touchstart',e=>{touchX=e.touches[0].clientX},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchX;
  if(Math.abs(dx)>50) goTo(dx<0?cur+1:cur-1);
});

// hover hints
$('nz-prev').addEventListener('mouseenter',()=>$('hint-l').style.opacity='.4');
$('nz-prev').addEventListener('mouseleave',()=>$('hint-l').style.opacity='0');
$('nz-next').addEventListener('mouseenter',()=>$('hint-r').style.opacity='.4');
$('nz-next').addEventListener('mouseleave',()=>$('hint-r').style.opacity='0');

// fake ctx for text measurement fallback
const ctx = {measureText:()=>({width:0})};

// GO
goTo(0);
</script>
